name: Continuous Integration

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22"
  PYTHON_VERSION: "3.12"
  PNPM_VERSION: "11.7.0"

jobs:
  web:
    name: Web quality gates
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6

      - name: Install pnpm
        uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install web dependencies
        run: pnpm install --frozen-lockfile

      - name: Run web tests
        run: pnpm test

      - name: Run web lint
        run: pnpm lint

      - name: Build web application
        run: pnpm build

  api:
    name: API quality gates
    runs-on: ubuntu-latest
    timeout-minutes: 10

    defaults:
      run:
        working-directory: services/core-api

    steps:
      - name: Check out repository
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: services/core-api/pyproject.toml

      - name: Install API dependencies
        run: python -m pip install -e '.[dev]'

      - name: Run API lint
        run: ruff check .

      - name: Run API tests
        run: pytest

  docker:
    name: Build ${{ matrix.name }} image
    runs-on: ubuntu-latest
    timeout-minutes: 20

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: web
            context: .
            dockerfile: Dockerfile
            image: northstar-web:ci
          - name: core-api
            context: services/core-api
            dockerfile: services/core-api/Dockerfile
            image: northstar-core-api:ci

    steps:
      - name: Check out repository
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6

      - name: Build image
        run: >-
          docker build
          --file "${{ matrix.dockerfile }}"
          --tag "${{ matrix.image }}"
          "${{ matrix.context }}"

  compose:
    name: Validate Compose configuration
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check out repository
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6

      - name: Validate Compose model
        run: docker compose config --quiet
